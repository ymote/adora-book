[book]
title = "The Adora Book"
authors = ["Adora Contributors"]
language = "en"
src = "src"

[build]
build-dir = "book"

[output.html]
default-theme = "ayu"
preferred-dark-theme = "ayu"
git-repository-url = "https://github.com/ymote/adora-book"
edit-url-template = "https://github.com/ymote/adora-book/edit/main/src/{path}"
site-url = "/adora-book/"
additional-css = ["theme/adora.css"]
